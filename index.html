<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 by Shivaay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Courier New',monospace;
  background:#000;
  min-height:100vh;
  width:100vw;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
  -webkit-user-select:none;
}

.phone{
width:390px;
  min-height:100vh;
  background:#faf8ef;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:0 18px;
  gap:16px;
}  

.title{
  font-size:4.8rem;
  font-weight:900;
  color:#776e65;
  letter-spacing:-2px;
  line-height:1;
}

.byline{
  font-size:0.62rem;
  letter-spacing:0.28em;
  color:#b5aca0;
  text-transform:uppercase;
  margin-top:3px;
  text-align:center;
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  width:100%;
}

.ctrl-box{
  background:#bbada0;
  border-radius:6px;
  padding:14px 6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}

.ctrl-label{
  font-size:0.48rem;
  letter-spacing:0.15em;
  color:#eee4da;
  text-transform:uppercase;
  font-weight:700;
}

.ctrl-value{
  font-size:1.5rem;
  font-weight:800;
  color:#fff;
  transition:transform 0.12s ease;
}

.ctrl-value.bump{transform:scale(1.25)}

.btn-box{
  cursor:pointer;
  background:#f59563;
  transition:background 0.1s,transform 0.1s;
}

.btn-box:hover{background:#f07040}
.btn-box:active{transform:scale(0.96)}
.btn-box .ctrl-label{color:#fff;font-size:0.58rem}
.btn-icon{font-size:1.2rem;color:#fff}

.grid-wrap{
  width:108%;
  aspect-ratio:1/1;
  background:#bbada0;
  border-radius:8px;
  padding:10px;
  position:relative;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:10px;
  width:100%;
  height:100%;
}

.cell{
  background:rgba(238,228,218,0.35);
  border-radius:4px;
  aspect-ratio:1/1;
}

.tile-layer{
  position:absolute;
  inset:10px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:10px;
  pointer-events:none;
}

.tile{
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:4px;
  font-weight:800;
  font-family:inherit;
  line-height:1;
  animation:appear 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes appear{from{transform:scale(0.4);opacity:0}to{transform:scale(1);opacity:1}}

.tile.merged{animation:merge 0.15s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes merge{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}

/* Classic 2048 tile colours */
.t2    {background:#eee4da;color:#776e65;font-size:1.6rem}
.t4    {background:#ede0c8;color:#776e65;font-size:1.6rem}
.t8    {background:#f2b179;color:#fff;font-size:1.6rem}
.t16   {background:#f59563;color:#fff;font-size:1.5rem}
.t32   {background:#f67c5f;color:#fff;font-size:1.5rem}
.t64   {background:#f65e3b;color:#fff;font-size:1.5rem}
.t128  {background:#edcf72;color:#fff;font-size:1.3rem}
.t256  {background:#edcc61;color:#fff;font-size:1.3rem}
.t512  {background:#edc850;color:#fff;font-size:1.3rem}
.t1024 {background:#edc53f;color:#fff;font-size:1.05rem}
.t2048 {background:#edc22e;color:#fff;font-size:1.05rem;box-shadow:0 0 0 4px rgba(237,194,46,0.5),0 0 24px rgba(237,194,46,0.3)}
.t4096 {background:#ff6b35;color:#fff;font-size:0.95rem}
.tmax  {background:#ff3366;color:#fff;font-size:0.85rem}

/* Overlay */
.overlay{
  display:none;
  position:absolute;
  inset:0;
  border-radius:8px;
  background:rgba(250,248,239,0.9);
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  z-index:10;
}

.overlay.show{display:flex}

.overlay-msg{
  font-size:1.7rem;
  font-weight:900;
  color:#776e65;
}

.overlay-btn{
  background:#f59563;
  border:none;
  color:#fff;
  font-family:inherit;
  font-size:0.7rem;
  font-weight:700;
  letter-spacing:0.15em;
  text-transform:uppercase;
  padding:11px 30px;
  border-radius:6px;
  cursor:pointer;
  transition:background 0.1s;
}

.overlay-btn:hover{background:#f07040}

.hint{
  font-size:0.5rem;
  letter-spacing:0.12em;
  color:#b5aca0;
  text-transform:uppercase;
}

@media(min-width:500px){
  .phone{
    min-height:unset;
    border-radius:36px;
    box-shadow:0 0 0 10px #000,0 0 0 13px #222,0 40px 80px rgba(0,0,0,0.9);
  }
}
</style>
</head>
<body>
<div class="phone">
  <div>
    <div class="title">2048</div>
    <div class="byline">by &nbsp; S H I V A A Y</div>
  </div>

  <div class="controls">
    <div class="ctrl-box">
      <span class="ctrl-label">Score</span>
      <span class="ctrl-value" id="score">0</span>
    </div>
    <div class="ctrl-box btn-box" id="btnNew" role="button" tabindex="0">
      <span class="btn-icon">↺</span>
      <span class="ctrl-label">New Game</span>
    </div>
    <div class="ctrl-box">
      <span class="ctrl-label">Best</span>
      <span class="ctrl-value" id="best">0</span>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="bg"></div>
    <div class="tile-layer" id="tiles"></div>
    <div class="overlay" id="overlay">
      <div class="overlay-msg" id="msg"></div>
      <button class="overlay-btn" id="btnRetry">try again</button>
    </div>
  </div>
  
</div>

<script>
(()=>{
'use strict';

const S=4;
let board,score,best,over,won,merged;

const $=id=>document.getElementById(id);
const scoreEl=$('score'),bestEl=$('best'),tilesEl=$('tiles'),
      bgEl=$('bg'),overlay=$('overlay'),msg=$('msg');

// build empty bg cells once
for(let i=0;i<16;i++){const d=document.createElement('div');d.className='cell';bgEl.appendChild(d);}

best=+localStorage.getItem('s2048b')||0;
bestEl.textContent=best;

function newGame(){
  board=Array.from({length:S},()=>Array(S).fill(0));
  score=0;over=false;won=false;merged=new Set();
  overlay.classList.remove('show');
  scoreEl.textContent=0;
  spawn();spawn();render();
}

function spawn(){
  const e=[];
  for(let r=0;r<S;r++)for(let c=0;c<S;c++)if(!board[r][c])e.push([r,c]);
  if(!e.length)return;
  const[r,c]=e[Math.floor(Math.random()*e.length)];
  board[r][c]=Math.random()<0.9?2:4;
}

function tClass(v){
  const m={2:'t2',4:'t4',8:'t8',16:'t16',32:'t32',64:'t64',
           128:'t128',256:'t256',512:'t512',1024:'t1024',2048:'t2048',4096:'t4096'};
  return m[v]||'tmax';
}

function render(){
  tilesEl.innerHTML='';
  for(let r=0;r<S;r++)for(let c=0;c<S;c++){
    const v=board[r][c];
    if(!v){tilesEl.appendChild(document.createElement('div'));continue;}
    const t=document.createElement('div');
    t.className='tile '+tClass(v);
    t.textContent=v;
    if(merged.has(r*S+c))t.classList.add('merged');
    tilesEl.appendChild(t);
  }
  merged.clear();
}

function slideRow(row){
  let a=row.filter(x=>x),g=0;
  for(let i=0;i<a.length-1;i++){
    if(a[i]===a[i+1]){a[i]*=2;g+=a[i];a.splice(i+1,1);i++;}
  }
  while(a.length<S)a.push(0);
  return{a,g};
}

function tp(b){return b[0].map((_,c)=>b.map(r=>r[c]));}

function move(dir){
  if(over)return;
  let nb=board.map(r=>[...r]),gained=0,moved=false,mc=new Set();
  const horiz=dir==='left'||dir==='right';
  const rev=dir==='right'||dir==='down';

  if(horiz){
    for(let r=0;r<S;r++){
      const row=rev?[...nb[r]].reverse():[...nb[r]];
      const{a,g}=slideRow(row);gained+=g;
      const res=rev?[...a].reverse():a;
      for(let c=0;c<S;c++){
        if(res[c]!==nb[r][c])moved=true;
        if(res[c]&&res[c]!==board[r][c])mc.add(r*S+c);
      }
      nb[r]=res;
    }
  }else{
    let t=tp(nb);
    for(let r=0;r<S;r++){
      const row=rev?[...t[r]].reverse():[...t[r]];
      const{a,g}=slideRow(row);gained+=g;
      const res=rev?[...a].reverse():a;
      for(let c=0;c<S;c++)if(res[c]!==t[r][c])moved=true;
      t[r]=res;
    }
    nb=tp(t);
    for(let r=0;r<S;r++)for(let c=0;c<S;c++)
      if(nb[r][c]&&nb[r][c]!==board[r][c])mc.add(r*S+c);
  }

  if(!moved)return;
  merged=mc;board=nb;
  score+=gained;
  if(score>best){best=score;localStorage.setItem('s2048b',best);bestEl.textContent=best;}
  scoreEl.textContent=score;
  if(gained){
    scoreEl.classList.remove('bump');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('bump');
    setTimeout(()=>scoreEl.classList.remove('bump'),160);
  }
  spawn();render();check();
}

function check(){
  if(!won){
    for(let r=0;r<S;r++)for(let c=0;c<S;c++)
      if(board[r][c]===2048){won=true;show('you win!');return;}
  }
  for(let r=0;r<S;r++)for(let c=0;c<S;c++){
    if(!board[r][c])return;
    if(c<S-1&&board[r][c]===board[r][c+1])return;
    if(r<S-1&&board[r][c]===board[r+1][c])return;
  }
  over=true;show('game over');
}

function show(m){msg.textContent=m;overlay.classList.add('show');}

const keys={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',
            a:'left',d:'right',w:'up',s:'down'};
document.addEventListener('keydown',e=>{
  const d=keys[e.key];if(d){e.preventDefault();move(d);}
});

let x0=0,y0=0;
document.addEventListener('touchstart',e=>{x0=e.touches[0].clientX;y0=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-x0,dy=e.changedTouches[0].clientY-y0;
  if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;
  move(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'));
},{passive:true});

$('btnNew').addEventListener('click',newGame);
$('btnNew').addEventListener('keydown',e=>{if(e.key==='Enter')newGame();});
$('btnRetry').addEventListener('click',newGame);

newGame();
})();
</script>
</body>
</html>
